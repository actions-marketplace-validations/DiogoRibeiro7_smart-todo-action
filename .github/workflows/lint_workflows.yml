name: Lint Workflows

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened]

jobs:
  actionlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Lint GitHub Actions workflows
        uses: raven-actions/actionlint@v2
        with:
          flags: >-
            -ignore "dist/index.js"
