name: Smart TODO Tracker

on:
  pull_request:
    branches: [main]
    types: [closed]

  workflow_dispatch:
    inputs:
      report:
        description: 'Generate TODO markdown report?'
        required: true
        default: 'true'
        type: choice
        options:
          - true
          - false

      structured:
        description: 'Enable structured tag parsing?'
        required: true
        default: 'false'
        type: choice
        options:
          - true
          - false

      llm:
        description: 'Use LLM for title/body generation?'
        required: true
        default: 'false'
        type: choice
        options:
          - true
          - false

      limit:
        description: 'Max number of issues to create'
        required: false
        default: '50'
    


jobs:
  smart-todo:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve repo token strategy
        run: |
          if [ -z "${{ secrets.PERSONAL_ACCESS_TOKEN }}" ]; then
            echo "::warning::PERSONAL_ACCESS_TOKEN is not set. Falling back to GITHUB_TOKEN."
          fi

      - run: yarn install --no-immutable
        env:
          YARN_ENABLE_HARDENED_MODE: "0"
      - run: yarn prepare

      - name: Run Smart TODO Action
        uses: ./
        with:
          repo-token: ${{ secrets.PERSONAL_ACCESS_TOKEN != '' && secrets.PERSONAL_ACCESS_TOKEN || github.token }}
          issue-title-template: src/templates/issueTitle.txt
          issue-body-template: src/templates/issueBody.md
          report: true
          structured: true
          llm: false
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload TODO report
        uses: actions/upload-artifact@v7
        with:
          name: todo-report
          path: TODO_REPORT.md

      - name: Generate Changelog from TODOs
        run: yarn changelog

      - name: Report generated changelog delta
        run: |
          echo "::notice::TODO report and changelog were generated as workflow outputs. No commit/PR is created automatically."
  
